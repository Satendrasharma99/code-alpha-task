kind = "web"
previewPath = "/"
title = "Flipkart Clone"
version = "1.0.0"
id = "artifacts/flipkart-clone"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25717

[services.development]
run = "pnpm --filter @workspace/flipkart-clone run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flipkart-clone", "run", "build" ]
publicDir = "artifacts/flipkart-clone/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25717"
BASE_PATH = "/"
